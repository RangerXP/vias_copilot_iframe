<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBIE Context Agent — Dev</title>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2/dist/powerbi.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-container">
    <div id="report-container"></div>
    <div id="chat-container">
      <div id="chat-header">Analytics Assistant</div>
      <div id="chat-history"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask about this report..." autocomplete="off">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>
  <script>
    // Dev/demo only: select a test user via ?user=<upn> query param so RLS
    // effectiveIdentity can be exercised without a real auth session
    // (docs/design_notes.md Section 15d). Must run before embed.js/chat.js.
    var __testUser = new URLSearchParams(window.location.search).get('user');
    if (__testUser) window.PBIE_USER_UPN = __testUser;
  </script>
  <script type="module" src="embed.js"></script>
  <script type="module" src="chat.js"></script>
</body>
</html>
