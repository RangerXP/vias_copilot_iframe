<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBIE Context Agent — Dev</title>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2/dist/powerbi.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="login-overlay">
    <div id="login-card">
      <h1>Analytics Assistant — Sign In</h1>
      <p>PoC login: pick a demo customer to establish a server-managed session (docs/design_notes.md &sect;17).</p>
      <button data-customer-id="regiona.test@visapoc.demo">Sign in as Contoso — North America</button>
      <button data-customer-id="regionb.test@visapoc.demo">Sign in as Contoso — Europe</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>
  <div id="app-container" style="display:none">
    <div id="report-container"></div>
    <div id="chat-container">
      <div id="chat-header">Analytics Assistant</div>
      <div id="chat-history"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask about this report..." autocomplete="off">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>
  <script type="module" src="session.js"></script>
  <script type="module" src="embed.js"></script>
  <script type="module" src="chat.js"></script>
</body>
</html>
